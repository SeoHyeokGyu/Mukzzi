services:
  frontend:
    image: ghcr.io/seohyeokgyu/mukzzi/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - SERVER_PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped

  bytebase:
    image: bytebase/bytebase:latest
    ports:
      - "8889:8080"
    volumes:
      - bytebase_data:/var/opt/bytebase
    command: --data /var/opt/bytebase --external-url http://${SERVER_IP}:8889 --port 8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Oracle Cloud 유휴 자원 회수 방지 (CPU 10% 초과 유지)
  # 1코어 x 50% = 전체 4코어 기준 12.5% 사용
  stress:
    image: alexeiled/stress-ng:latest
    command: --cpu 1 --cpu-load 50 --timeout 0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: 64m

volumes:
  postgres_data:
  redis_data:
  uptime_kuma_data:
  bytebase_data:
