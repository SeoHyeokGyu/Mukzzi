# .air.toml
# Config file for [Air](https://github.com/cosmtrek/air) in TOML format

# Working directory
# . is the root of the project
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old shell command. You could use `make` as well.
  cmd = "go build -o ./tmp/main ./cmd/server/main.go"
  # Binary file yields from `cmd`.
  bin = "tmp/main"
  # Customize binary, can setup environment variables when run your binary.
  full_bin = "APP_ENV=dev ./tmp/main"
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "toml", "env"]
  # Ignore these filename extensions.
  exclude_ext = ["test.go"]
  # Ignore these directories.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs"]
  # Watch these directories if you specified.
  include_dir = []
  # Exclude specific files.
  exclude_file = []
  # This log file places in your tmp_dir.
  log = "air.log"
  # It's not necessary to trigger build each time file changes if it's too frequent.
  delay = 1000 # ms
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process.
  send_interrupt = true
  # Delay after sending Interrupt signal.
  kill_delay = 500 # ms

[log]
  # Show log time
  time = true

[color]
  # Customize each part's color. If no color found, use the raw log message.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
